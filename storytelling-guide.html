<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Storytelling Guide</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
<script src="./storytelling-guide.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --blue: #22528e; --font: 'Satoshi','Helvetica Neue',system-ui,sans-serif; --ease: cubic-bezier(0.4,0,0.2,1); }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font); height: 100vh; transition: background 0.4s ease; user-select: none; }

body.dark {
  background: #22528e;
  --text:    #ffffff; --text-2: rgba(255,255,255,0.68); --text-3: rgba(255,255,255,0.36);
  --surface: rgba(255,255,255,0.1); --surface-2: rgba(255,255,255,0.06);
  --border-2: rgba(255,255,255,0.3); --arrow: rgba(255,255,255,0.28); --arrow-h: #fff;
  --rule: rgba(255,255,255,0.5); --accent: rgba(255,255,255,0.9); --prog: rgba(255,255,255,0.75);
  --green: rgba(100,220,160,0.9); --red: rgba(255,110,90,0.85);
  --premium: rgba(255,200,80,0.9); --selfmade: rgba(140,210,255,0.85);
}
body.light {
  background: #F4F5F9;
  --text: #22528e; --text-2: rgba(34,82,142,0.72); --text-3: rgba(34,82,142,0.38);
  --surface: #ffffff; --surface-2: rgba(34,82,142,0.04);
  --border-2: rgba(34,82,142,0.25); --arrow: rgba(34,82,142,0.22); --arrow-h: #22528e;
  --rule: #22528e; --accent: #22528e; --prog: #22528e;
  --green: #1a7a4a; --red: #b03020;
  --premium: #8a6200; --selfmade: #0a5a8a;
}

/* CHROME */
.logo { position:fixed; top:26px; left:32px; z-index:300; display:flex; align-items:center; gap:9px; font-size:10px; font-weight:700; letter-spacing:0.24em; text-transform:uppercase; color:var(--text-3); transition:color 0.4s; }
.logo-dot { width:5px; height:5px; border-radius:50%; background:var(--rule); flex-shrink:0; transition:background 0.4s; }
.center-label { position:fixed; top:26px; left:50%; transform:translateX(-50%); z-index:300; font-size:10px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-3); white-space:nowrap; transition:color 0.4s; }
.switcher { position:fixed; top:18px; right:24px; z-index:300; display:flex; background:var(--surface); border:1px solid var(--border-2); border-radius:40px; padding:3px; gap:2px; transition:background 0.4s,border-color 0.4s; }
.sw-btn { padding:5px 16px; border-radius:36px; border:none; background:transparent; color:var(--text-3); font-family:var(--font); font-size:9px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; transition:all 0.22s ease; }
.sw-btn.active { background:var(--blue); color:#fff; }
.nav { position:fixed; top:50%; transform:translateY(-50%); z-index:300; background:none; border:none; cursor:pointer; padding:20px 10px; color:var(--arrow); transition:color 0.2s ease; }
.nav:hover { color:var(--arrow-h); }
.nav:active { transform:translateY(-50%) scale(0.9); }
.nav-l { left:4px; } .nav-r { right:4px; }
.nav svg { display:block; width:28px; height:28px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.progress { position:fixed; bottom:0; left:0; height:2px; background:var(--prog); transition:width 0.45s var(--ease); z-index:300; }
.counter { position:fixed; bottom:18px; right:32px; font-size:10px; letter-spacing:0.1em; color:var(--text-3); z-index:300; font-weight:500; transition:color 0.4s; }

/* SLIDES */
#slides { width:100%; height:100%; position:relative; }
.slide { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 140px; text-align:center; opacity:0; transform:translateY(16px); transition:opacity 0.36s var(--ease),transform 0.36s var(--ease); pointer-events:none; }
.slide.on { opacity:1; transform:translateY(0); pointer-events:all; }
.slide.exit { opacity:0; transform:translateY(-10px); transition:opacity 0.22s var(--ease),transform 0.22s var(--ease); }

/* TITLE */
.s-title { text-align:center; }
.title-studio { font-size:11px; font-weight:700; letter-spacing:0.32em; text-transform:uppercase; color:var(--text-3); margin-bottom:32px; }
.title-main { font-size:clamp(38px,5.2vw,72px); font-weight:900; letter-spacing:0.01em; line-height:1.0; color:var(--text); text-transform:uppercase; max-width:820px; transition:color 0.4s; }
.title-rule { width:28px; height:2px; background:var(--rule); margin:32px auto; transition:background 0.4s; }
.title-client { font-size:16px; font-weight:300; letter-spacing:0.1em; color:var(--text-2); transition:color 0.4s; }

/* NARRATIVE KERN */
.s-core { text-align:center; }
.core-eyebrow { font-size:10px; font-weight:700; letter-spacing:0.28em; text-transform:uppercase; color:var(--text-3); margin-bottom:20px; display:flex; align-items:center; justify-content:center; gap:14px; transition:color 0.4s; }
.core-eyebrow::before, .core-eyebrow::after { content:''; display:block; width:24px; height:1px; background:var(--rule); opacity:0.5; }
.core-leitsatz { font-size:clamp(44px,6.5vw,88px); font-weight:900; letter-spacing:-0.03em; line-height:0.95; color:var(--text); margin-bottom:28px; text-transform:uppercase; transition:color 0.4s; }
.core-sub { font-size:17px; font-weight:300; color:var(--text-2); max-width:560px; line-height:1.8; transition:color 0.4s; }

/* BEDEUTUNG — no bullets, left-aligned in columns */
.s-meaning { align-items:center; }
.meaning-inner { width:100%; max-width:820px; }
.meaning-title { font-size:clamp(26px,3vw,42px); font-weight:900; letter-spacing:0.01em; text-transform:uppercase; color:var(--text); margin-bottom:28px; text-align:center; transition:color 0.4s; }
.meaning-cols { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
.meaning-col { padding:32px 36px; background:var(--surface); text-align:left; }
.meaning-col-label { font-size:10px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:18px; transition:color 0.4s; }
.meaning-col.yes .meaning-col-label { color:var(--green); }
.meaning-col.no  .meaning-col-label { color:var(--red); }
.meaning-item { font-size:17px; font-weight:300; color:var(--text-2); line-height:1.8; margin-bottom:9px; padding-left:14px; position:relative; transition:color 0.4s; }
.meaning-item::before { content:''; position:absolute; left:0; top:10px; width:4px; height:4px; border-radius:50%; }
.meaning-col.yes .meaning-item::before { background:var(--green); }
.meaning-col.no  .meaning-item::before { background:var(--red); }

/* SÄULE */
.s-pillar { align-items:center; }
.pillar-inner { width:100%; max-width:820px; text-align:left; }
.pillar-num { font-size:11px; font-weight:700; letter-spacing:0.26em; text-transform:uppercase; color:var(--text-3); margin-bottom:6px; transition:color 0.4s; }
.pillar-goal { font-size:11px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:20px; transition:color 0.4s; }
.pillar-title-row { display:flex; align-items:center; gap:20px; margin-bottom:20px; }
.pillar-icon { width:52px; height:52px; flex-shrink:0; opacity:0.85; }
.pillar-icon svg { width:100%; height:100%; stroke:var(--text); fill:none; stroke-width:1.4; stroke-linecap:round; stroke-linejoin:round; transition:stroke 0.4s; }
.pillar-name { font-size:clamp(32px,4.4vw,60px); font-weight:900; letter-spacing:0.01em; text-transform:uppercase; color:var(--text); line-height:1.0; transition:color 0.4s; }
.pillar-purpose { font-size:17px; font-weight:300; color:var(--text-2); line-height:1.78; margin-bottom:14px; transition:color 0.4s; }
.pillar-audience-row { display:flex; align-items:baseline; gap:10px; }
.pillar-audience-label { font-size:10px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-3); flex-shrink:0; transition:color 0.4s; }
.pillar-audience { font-size:15px; font-weight:300; color:var(--text-2); line-height:1.65; transition:color 0.4s; }
.s-principles { align-items:center; }
.principles-inner { width:100%; max-width:860px; }
.principles-header { margin-bottom:22px; text-align:center; }
.principles-eyebrow { font-size:10px; font-weight:700; letter-spacing:0.26em; text-transform:uppercase; color:var(--text-3); margin-bottom:8px; transition:color 0.4s; }
.principles-title { font-size:clamp(28px,3.4vw,48px); font-weight:900; letter-spacing:0.01em; text-transform:uppercase; color:var(--text); transition:color 0.4s; }
.principles-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:2px; }
.principle-card { background:var(--surface); padding:24px 22px; text-align:left; transition:background 0.4s; }
.principle-num { font-size:10px; font-weight:700; letter-spacing:0.2em; color:var(--text-3); margin-bottom:10px; transition:color 0.4s; }
.principle-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:8px; line-height:1.3; transition:color 0.4s; }
.principle-body { font-size:14px; font-weight:300; color:var(--text-2); line-height:1.72; transition:color 0.4s; }

/* FORMATE INTRO */
.s-formats-intro { text-align:center; }
.fi-eyebrow { font-size:10px; font-weight:700; letter-spacing:0.28em; text-transform:uppercase; color:var(--text-3); margin-bottom:20px; display:flex; align-items:center; justify-content:center; gap:14px; transition:color 0.4s; }
.fi-eyebrow::before,.fi-eyebrow::after { content:''; display:block; width:24px; height:1px; background:var(--rule); opacity:0.5; }
.fi-title { font-size:clamp(42px,6vw,80px); font-weight:900; letter-spacing:-0.03em; line-height:0.95; text-transform:uppercase; color:var(--text); margin-bottom:22px; transition:color 0.4s; }
.fi-sub { font-size:16px; font-weight:300; color:var(--text-2); max-width:520px; line-height:1.8; transition:color 0.4s; }
.fi-legend { display:flex; align-items:center; justify-content:center; gap:28px; margin-top:32px; }
.fi-legend-item { display:flex; align-items:center; gap:8px; font-size:11px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-3); transition:color 0.4s; }
.fi-badge { display:inline-block; font-size:8px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; padding:4px 10px; border-radius:2px; }
.fi-badge.premium { background:rgba(255,200,80,0.15); color:var(--premium); }
.fi-badge.selfmade { background:rgba(140,210,255,0.15); color:var(--selfmade); }

/* FORMAT SLIDE */
.s-format { align-items:center; overflow-y:auto; justify-content:flex-start; padding-top:72px; }
.format-inner { width:100%; max-width:820px; text-align:left; }
.format-header { background:var(--surface); padding:16px 22px; margin-bottom:3px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; transition:background 0.4s; }
.format-header-left { display:flex; flex-direction:column; gap:4px; }
.format-pillar-name { font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-3); transition:color 0.4s; }
.format-pillar-goal { font-size:10px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-3); transition:color 0.4s; }
.format-pillar-audience { font-size:10px; font-weight:300; color:var(--text-3); letter-spacing:0.06em; transition:color 0.4s; }
.format-type-badge { display:inline-block; font-size:8px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; padding:5px 12px; border-radius:2px; flex-shrink:0; }
.format-type-badge.premium { background:rgba(255,200,80,0.15); color:var(--premium); }
.format-type-badge.selfmade { background:rgba(140,210,255,0.15); color:var(--selfmade); }
.format-name { font-size:clamp(22px,2.8vw,38px); font-weight:900; letter-spacing:0.01em; text-transform:uppercase; color:var(--text); margin-bottom:3px; margin-top:16px; transition:color 0.4s; }
.format-desc { font-size:16px; font-weight:300; color:var(--text-2); line-height:1.78; margin-bottom:16px; transition:color 0.4s; }
.format-grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; margin-bottom:2px; }
.format-cell { background:transparent; border:1px solid var(--border-2); padding:14px 18px; transition:border-color 0.4s; }
.format-cell-full { background:transparent; border:1px solid var(--border-2); padding:14px 18px; margin-bottom:2px; transition:border-color 0.4s; }
.fc-label { font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-3); margin-bottom:6px; transition:color 0.4s; }
.fc-value { font-size:14px; font-weight:300; color:var(--text-2); line-height:1.7; transition:color 0.4s; }
.fc-value.emotion { font-weight:600; color:var(--accent); font-size:13px; letter-spacing:0.08em; }

/* PLATFORM */
.s-platform { align-items:center; }
.platform-inner { width:100%; max-width:820px; }
.platform-eyebrow { font-size:10px; font-weight:700; letter-spacing:0.26em; text-transform:uppercase; color:var(--text-3); margin-bottom:8px; transition:color 0.4s; }
.platform-title { font-size:clamp(28px,3.6vw,50px); font-weight:900; letter-spacing:0.01em; text-transform:uppercase; color:var(--text); margin-bottom:22px; transition:color 0.4s; }
.platform-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; }
.platform-item { background:var(--surface); padding:24px 24px; text-align:left; transition:background 0.4s; }
.platform-name { font-size:18px; font-weight:900; letter-spacing:0.04em; text-transform:uppercase; color:var(--text); margin-bottom:4px; transition:color 0.4s; }
.platform-role { font-size:10px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-3); margin-bottom:12px; transition:color 0.4s; }
.platform-content { font-size:13px; font-weight:300; color:var(--text-2); line-height:1.72; margin-bottom:14px; transition:color 0.4s; }
.platform-meta { display:flex; gap:16px; }
.platform-priority { font-size:10px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-3); transition:color 0.4s; }
.platform-cadence { font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); transition:color 0.4s; }

/* RHYTHM */
.s-rhythm { align-items:center; }
.rhythm-inner { width:100%; max-width:820px; }
.rhythm-eyebrow { font-size:10px; font-weight:700; letter-spacing:0.26em; text-transform:uppercase; color:var(--text-3); margin-bottom:8px; transition:color 0.4s; }
.rhythm-title { font-size:clamp(28px,3.6vw,50px); font-weight:900; letter-spacing:0.01em; text-transform:uppercase; color:var(--text); margin-bottom:6px; transition:color 0.4s; }
.rhythm-sub { font-size:15px; font-weight:300; color:var(--text-2); line-height:1.75; margin-bottom:22px; max-width:560px; transition:color 0.4s; }
.rhythm-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:2px; margin-bottom:10px; }
.rhythm-day { background:var(--surface); padding:18px 18px; text-align:left; transition:background 0.4s; }
.rhythm-day-name { font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-3); margin-bottom:10px; transition:color 0.4s; }
.rhythm-day-platform { font-size:13px; font-weight:700; color:var(--text); margin-bottom:4px; transition:color 0.4s; }
.rhythm-day-pillar { font-size:11px; color:var(--text-3); margin-bottom:6px; transition:color 0.4s; }
.rhythm-day-format { font-size:12px; font-weight:300; color:var(--text-2); line-height:1.6; transition:color 0.4s; }
.rhythm-shoot { font-size:11px; font-weight:500; color:var(--text-3); text-align:center; letter-spacing:0.08em; transition:color 0.4s; }

/* END */
.s-end { text-align:center; }
.end-heading { font-size:clamp(60px,8vw,110px); font-weight:900; letter-spacing:-0.04em; line-height:0.9; color:var(--text); margin-bottom:14px; transition:color 0.4s; }
.end-sub { font-size:12px; font-weight:600; letter-spacing:0.24em; text-transform:uppercase; color:var(--text-3); margin-bottom:36px; transition:color 0.4s; }
.end-steps { display:grid; grid-template-columns:repeat(4,1fr); gap:2px; width:100%; max-width:900px; }
.end-step { padding:24px 22px; background:var(--surface); text-align:left; transition:background 0.4s; }
.end-step-num { font-size:10px; font-weight:700; letter-spacing:0.2em; color:var(--text-3); margin-bottom:10px; transition:color 0.4s; }
.end-step-title { font-size:15px; font-weight:700; color:var(--text); margin-bottom:8px; line-height:1.3; transition:color 0.4s; }
.end-step:last-child .end-step-title { color:var(--accent); }
.end-step-body { font-size:13px; font-weight:300; color:var(--text-2); line-height:1.7; transition:color 0.4s; }
</style>
</head>
<body class="dark">

<div class="logo"><span class="logo-dot"></span>Little Lights</div>
<div class="center-label">Social Media Storytelling Guide</div>
<div class="switcher">
  <button class="sw-btn active" id="sw-dark" onclick="setTheme('dark')">Dark</button>
  <button class="sw-btn" id="sw-light" onclick="setTheme('light')">Light</button>
</div>
<button class="nav nav-l" onclick="go(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
<button class="nav nav-r" onclick="go(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
<div id="slides"></div>
<div class="progress" id="prog"></div>
<div class="counter" id="ctr"></div>

<script>
// ── ICONS ────────────────────────────────────────────────
const ICONS = {
  person: `<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`,
  camera: `<svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><circle cx="12" cy="14" r="4"/><path d="M8 7l2-4h4l2 4"/></svg>`,
  thought: `<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`
};

// ── BUILD SLIDES ─────────────────────────────────────────
const slides = [];
const addSlide = (type, content) => slides.push({ type, content });

addSlide('title', {});
addSlide('core', {});
addSlide('meaning', {});
GUIDE.pillars.forEach(p => addSlide('pillar', p));
addSlide('platform', {});
addSlide('principles', {});
addSlide('formats-intro', {});
GUIDE.formats.forEach(f => addSlide('format', f));
addSlide('rhythm', {});
addSlide('end', {});

// ── RENDER ───────────────────────────────────────────────
const container = document.getElementById('slides');
const TOTAL = slides.length;

slides.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'slide' + (i === 0 ? ' on' : '');

  switch (s.type) {

    case 'title':
      el.classList.add('s-title');
      el.innerHTML = `
        <p class="title-studio">Little Lights Studio — Reels & Stories</p>
        <h1 class="title-main">Social Media<br>Storytelling Guide</h1>
        <div class="title-rule"></div>
        <p class="title-client">${GUIDE.client} &nbsp;·&nbsp; ${GUIDE.date}</p>`;
      break;

    case 'core':
      el.classList.add('s-core');
      el.innerHTML = `
        <p class="core-eyebrow">Narrativer Kern</p>
        <h2 class="core-leitsatz">${GUIDE.narrative_core.leitsatz}</h2>
        <p class="core-sub">${GUIDE.narrative_core.subtext}</p>`;
      break;

    case 'meaning': {
      const nc = GUIDE.narrative_core;
      el.classList.add('s-meaning');
      const yes = nc.wir_erzaehlen.map(i => `<p class="meaning-item">${i}</p>`).join('');
      const no  = nc.wir_erzaehlen_nicht.map(i => `<p class="meaning-item">${i}</p>`).join('');
      el.innerHTML = `
        <div class="meaning-inner">
          <h2 class="meaning-title">Was das bedeutet</h2>
          <div class="meaning-cols">
            <div class="meaning-col yes"><p class="meaning-col-label">Wir erzählen</p>${yes}</div>
            <div class="meaning-col no"><p class="meaning-col-label">Wir erzählen nicht</p>${no}</div>
          </div>
        </div>`;
      break;
    }

    case 'pillar': {
      const p = s.content;
      el.classList.add('s-pillar');
      el.innerHTML = `
        <div class="pillar-inner">
          <p class="pillar-num">Content-Säule ${p.id.slice(-1)}</p>
          <p class="pillar-goal">${p.goal}</p>
          <div class="pillar-title-row">
            <div class="pillar-icon">${ICONS[p.icon] || ''}</div>
            <h2 class="pillar-name">${p.name}</h2>
          </div>
          <p class="pillar-purpose">${p.purpose}</p>
          <div class="pillar-audience-row">
            <span class="pillar-audience-label">Zielgruppe</span>
            <span class="pillar-audience">${p.audience}</span>
          </div>
        </div>`;
      break;
    }

    case 'platform': {
      el.classList.add('s-platform');
      const items = GUIDE.platforms.map(p => `
        <div class="platform-item">
          <p class="platform-name">${p.name}</p>
          <p class="platform-role">${p.role}</p>
          <p class="platform-content">${p.content}</p>
          <div class="platform-meta">
            <p class="platform-priority">Priorität: ${p.priority}</p>
            <p class="platform-cadence">${p.cadence}</p>
          </div>
        </div>`).join('');
      el.innerHTML = `
        <div class="platform-inner">
          <p class="platform-eyebrow">Plattform-Strategie</p>
          <h2 class="platform-title">Welche Plattform<br>für welche Aufgabe</h2>
          <div class="platform-grid">${items}</div>
        </div>`;
      break;
    }

    case 'principles': {
      el.classList.add('s-principles');
      const cards = GUIDE.principles.map(p => `
        <div class="principle-card">
          <p class="principle-num">${p.num}</p>
          <p class="principle-title">${p.title}</p>
          <p class="principle-body">${p.body}</p>
        </div>`).join('');
      el.innerHTML = `
        <div class="principles-inner">
          <div class="principles-header">
            <p class="principles-eyebrow">Leitprinzipien</p>
            <h2 class="principles-title">Wie wir Content denken</h2>
          </div>
          <div class="principles-grid">${cards}</div>
        </div>`;
      break;
    }

    case 'formats-intro':
      el.classList.add('s-formats-intro');
      el.innerHTML = `
        <p class="fi-eyebrow">Formate</p>
        <h2 class="fi-title">Die Formate</h2>
        <p class="fi-sub">Jede Säule hat konkrete, wiederkehrende Formate — entwickelt für Kontinuität und Wiedererkennung.</p>
        <div class="fi-legend">
          <div class="fi-legend-item"><span class="fi-badge premium">Premium</span> Mit professioneller Produktion</div>
          <div class="fi-legend-item"><span class="fi-badge selfmade">Selfmade</span> Eigenständig umsetzbar</div>
        </div>`;
      break;

    case 'format': {
      const f = s.content;
      el.classList.add('s-format');
      el.innerHTML = `
        <div class="format-inner">
          <div class="format-header">
            <div class="format-header-left">
              <span class="format-pillar-name">${f.pillar}</span>
              <span class="format-pillar-goal">${f.pillar_goal}</span>
              <span class="format-pillar-audience">${f.pillar_audience}</span>
            </div>
            <span class="format-type-badge ${f.type}">${f.type === 'premium' ? 'Premium' : 'Selfmade'}</span>
          </div>
          <h2 class="format-name">${f.name}</h2>
          <p class="format-desc">${f.description}</p>
          <div class="format-grid">
            <div class="format-cell">
              <p class="fc-label">Protagonisten</p>
              <p class="fc-value">${f.protagonists}</p>
            </div>
            <div class="format-cell">
              <p class="fc-label">Kanäle</p>
              <p class="fc-value">${f.channels}</p>
            </div>
          </div>
          <div class="format-cell-full">
            <p class="fc-label">Beispiel-Story</p>
            <p class="fc-value">${f.example_story}</p>
          </div>
          <div class="format-grid">
            <div class="format-cell">
              <p class="fc-label">Call-to-Action</p>
              <p class="fc-value">${f.cta}</p>
            </div>
            <div class="format-cell">
              <p class="fc-label">Emotion</p>
              <p class="fc-value emotion">${f.emotion}</p>
            </div>
          </div>
        </div>`;
      break;
    }

    case 'rhythm': {
      const r = GUIDE.rhythm;
      el.classList.add('s-rhythm');
      const days = r.weekly.map(d => `
        <div class="rhythm-day">
          <p class="rhythm-day-name">${d.day}</p>
          <p class="rhythm-day-platform">${d.platform}</p>
          <p class="rhythm-day-pillar">${d.pillar}</p>
          <p class="rhythm-day-format">${d.format}</p>
        </div>`).join('');
      el.innerHTML = `
        <div class="rhythm-inner">
          <p class="rhythm-eyebrow">Posting-Rhythmus</p>
          <h2 class="rhythm-title">${r.principle}</h2>
          <p class="rhythm-sub">${r.subtext}</p>
          <div class="rhythm-grid">${days}</div>
          <p class="rhythm-shoot">${r.shoot_day}</p>
        </div>`;
      break;
    }

    case 'end': {
      el.classList.add('s-end');
      const steps = GUIDE.next_steps.map(s => `
        <div class="end-step">
          <p class="end-step-num">${s.num}</p>
          <p class="end-step-title">${s.title}</p>
          <p class="end-step-body">${s.body}</p>
        </div>`).join('');
      el.innerHTML = `
        <h2 class="end-heading">Los geht's.</h2>
        <p class="end-sub">Nächste Schritte</p>
        <div class="end-steps">${steps}</div>`;
      break;
    }
  }

  container.appendChild(el);
});

// ── STATE ────────────────────────────────────────────────
let cur = 0;
const els = () => document.querySelectorAll('.slide');

function upd() {
  const pct = ((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('prog').style.width = pct;
  document.getElementById('ctr').textContent = (cur+1)+' / '+TOTAL;
}

function go(d) {
  const all = els();
  all[cur].classList.add('exit');
  all[cur].classList.remove('on');
  const prev = cur;
  cur = Math.max(0, Math.min(TOTAL-1, cur+d));
  setTimeout(() => all[prev].classList.remove('exit'), 240);
  all[cur].classList.add('on');
  upd();
}

function setTheme(t) {
  document.body.className = t;
  document.getElementById('sw-dark').classList.toggle('active', t==='dark');
  document.getElementById('sw-light').classList.toggle('active', t==='light');
}

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight') { e.preventDefault(); go(1); }
  if (e.key==='ArrowLeft')  { e.preventDefault(); go(-1); }
});

upd();
</script>
